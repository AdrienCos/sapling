---
name: Lint
on:
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/common
      - run: |
          uv run ruff format --check ./src tests/
          uv run ruff check ./src tests/
          uv run ty check
          uv run typos .
          uv lock --check
