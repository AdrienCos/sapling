---
name: Create a Release - Nushell
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "*"
      - name: Build dist
        run: nu ci.nu dist
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "*"
      - name: Build PEX
        run: nu ci.nu pex
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pex
          path: dist/

  publish_dist:
    name: Publish the dist to Pypi.org
    runs-on: ubuntu-latest
    needs: [dist]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/common
      - name: Download the Python dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to Pypi
        run: pdm publish
        env:
          PDM_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  create_release:
    name: Create and publish a tagged release
    runs-on: ubuntu-latest
    needs: [dist, pex]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Download pex
        uses: actions/download-artifact@v4
        with:
          name: pex
          path: dist/
      - name: Create the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  docker-build:
    runs-on: ubuntu-latest
    name: Build, tag, and push a Docker image
    env:
      IMAGE: ghcr.io/adriencos/sapling:${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "*"
      - name: Build Docker image
        run: nu ci.nu docker-build --tag $IMAGE
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push
        run: docker push $IMAGE
