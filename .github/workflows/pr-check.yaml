---
name: PR Check - Dagger
on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.0"
          verb: "check"
          module: ./.dagger
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.0"
          verb: "call"
          module: ./.dagger
          args: build export --path=dist/
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Export artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  docker-build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/adriencos/sapling:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.0"
          verb: "call"
          module: ./.dagger
          args: docker-build export-image --name=$IMAGE
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push
        run: |
          docker push $IMAGE
